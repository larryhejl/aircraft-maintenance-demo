# Notify Microsoft Teams when the GitHub Pages site deploys successfully.
# Requires a repository secret named TEAMS_WEBHOOK_URL containing
# the Incoming Webhook URL from your Teams channel.

name: Notify Teams on Deploy

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: [completed]

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Teams notification
        run: |
          curl -H 'Content-Type: application/json' -d '{
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "summary": "Site Deployed",
            "themeColor": "00CC00",
            "title": "✅ Aircraft Maintenance Dashboard deployed successfully",
            "sections": [{
              "facts": [
                { "name": "Repository", "value": "${{ github.repository }}" },
                { "name": "Branch", "value": "${{ github.event.workflow_run.head_branch }}" },
                { "name": "Triggered by", "value": "${{ github.event.workflow_run.actor.login }}" }
              ]
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View Site",
              "targets": [{ "os": "default", "uri": "https://larryhejl.github.io/aircraft-maintenance-demo/" }]
            }]
          }' ${{ secrets.TEAMS_WEBHOOK_URL }}
